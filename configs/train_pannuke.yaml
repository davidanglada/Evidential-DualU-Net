dataset:
  train: {name: pannuke, root: /path/to/pannuke, fold: fold_1, num_classes: 5}
  val: {name: pannuke, root: /path/to/pannuke, fold: fold_2, num_classes: 5}
loader:
  train: {shuffle: true, batch_size: 8, num_workers: 4, drop_last: false}
  val: {shuffle: false, batch_size: 4, num_workers: 2, drop_last: false}
model:
  model_name: dualunet
  encoder_name: resnet34
  encoder_weights: imagenet
  classes_s: 5
  classes_c: 1
  decoder_channels: [256, 128, 64, 32, 16]
  decoder_use_batchnorm: true
optimizer: {lr_base: 0.0001, epochs: 200, weight_decay: 0.0001, lr_drop_factor: 0.1, lr_drop_steps: [140, 180], lr_auto_scale: true, base_batch_size: 8}
training: {loss_type: base, seg_mode: edl_mse, weight_seg: 1.0, weight_cent: 0.7, weight_dice: 0.4, kl_variant_seg: sensoy, kl_apply_seg: all, kl_max: 0.2, kl_ramp_epochs: 40, sigma: 5}
transforms:
  normalize: {mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
  augmentations: [{name: hflip, p: 0.5}, {name: vflip, p: 0.5}, {name: rotate90}]
evaluation: {thresholds: [0.5], max_pair_distance: 12, interval: 10, th_centroid: 0.15}
experiment: {wandb: false, project: Evidential-DualU-Net, name: pannuke_baseline, seed: 42, output_dir: outputs/pannuke, output_name: best, resume: false}
distributed: false

