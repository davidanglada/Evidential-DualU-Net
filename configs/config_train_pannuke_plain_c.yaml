dataset:
  train:
    name: pannuke
    root: "/path/to/pannuke"  # Path to the training dataset
    fold: foldfold_2
    num_classes: 5                   # Fold to use for training
  val:
    name: pannuke
    root: "/path/to/pannuke"    # Path to the validation dataset
    fold: foldfold_3
    num_classes: 5                   # Fold to use for validation

loader:
  train:
    shuffle: True
    batch_size: 16
    num_workers: 4
    drop_last: False
  val:
    shuffle: False
    batch_size: 1
    num_workers: 1
    drop_last: False

optimizer:
  lr_base: 0.0001
  epochs: 200
  weight_decay: 0.0001
  lr_drop_factor: 0.1
  lr_drop_steps:
    - 140
    - 180
  lr_auto_scale: True

distributed: True

training:
  weight_dice: 1.0
  weight_dice_b: 1.0
  weight_ce: 1.0
  weight_mse: 1.0
  ce_weights: ./ce_weights_pannuke_foldfold_2_b10.npy
  sigma: 5
  th: 0.15

transforms:
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
  augmentations:
    - name: "hflip"
      p: 0.5
    - name: "vflip"
      p: 0.5
    - name: "rotate90"

model:
  encoder_name: resnext50_32x4d 
  classes_s: 5                   
  classes_c: 1                    
  encoder_weights: imagenet      
  decoder_channels: [256, 128, 64, 32, 16] 
  decoder_use_batchnorm: True

evaluation:
  thresholds: [0.5]
  max_pair_distance: 12
  interval: 10

experiment:
  wandb: True
  project: "DualU-Net_pannuke_CAL"
  name: "resnext_pannuke_23_seed_42_plain_c_g100_no_norm"
  seed: 42
  output_dir: outputs/checkpoints
  output_name: "resnext_pannuke_23_seed_42_plain_c_g100_no_norm" 
  resume: False
